<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDE</title>
  <meta name="description" content="A mesmerizing galaxy animation with stars, nebula effects, and two names connected by a heart.">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      width: 100vw;
      height: 100vh;
      font-family: 'Outfit', sans-serif;
    }

    canvas#galaxy {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* ─── Central text overlay ─── */
    .center-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      animation: fadeInUp 2.5s ease-out forwards;
      opacity: 0;
    }

    .names-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: nowrap;
    }

    .name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.4rem, 6vw, 5.5rem);
      background: linear-gradient(135deg, #ff6fd8, #ffb1e6, #a78bfa, #60a5fa);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
      filter: drop-shadow(0 0 28px rgba(167, 139, 250, .6));
      white-space: nowrap;
    }

    .heart {
      font-size: clamp(2rem, 5vw, 4.5rem);
      color: #ff4d6d;
      animation: heartbeat 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 77, 109, .8))
             drop-shadow(0 0 60px rgba(255, 77, 109, .35));
      line-height: 1;
    }

    .subtitle {
      margin-top: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(.85rem, 2vw, 1.15rem);
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      animation: fadeInUp 2.5s 1s ease-out forwards;
      opacity: 0;
    }

    /* ─── Keyframes ─── */
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      15%     { transform: scale(1.25); }
      30%     { transform: scale(1); }
      45%     { transform: scale(1.18); }
      60%     { transform: scale(1); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    /* Glow ring behind text */
    .center-text::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 420px; height: 420px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(167,139,250,.12) 0%,
        rgba(255,77,109,.06) 40%,
        transparent 70%
      );
      filter: blur(30px);
      pointer-events: none;
      z-index: -1;
    }

    /* ─── Rotating Image ─── */
    .rotating-image-container {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      animation: fadeInBottom 2s 1.5s ease-out forwards;
      opacity: 0;
    }

    .rotating-image-wrapper {
      width: clamp(100px, 18vw, 180px);
      height: clamp(100px, 18vw, 180px);
      border-radius: 22px;
      padding: 3px;
      background: linear-gradient(135deg, #a78bfa, #ff4d6d, #60a5fa, #ff6fd8);
      background-size: 400% 400%;
      animation: borderShimmer 4s ease-in-out infinite;
      box-shadow:
        0 0 25px rgba(167, 139, 250, 0.4),
        0 0 60px rgba(255, 77, 109, 0.2);
    }

    .rotating-image-inner {
      width: 100%;
      height: 100%;
      border-radius: 19px;
      overflow: hidden;
      background: #0d0a1a;
    }

    .rotating-image-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 19px;
      animation: rotateImage 20s linear infinite;
    }

    @keyframes rotateImage {
      from { transform: rotate(0deg) scale(1.15); }
      to   { transform: rotate(360deg) scale(1.15); }
    }

    @keyframes borderShimmer {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    @keyframes fadeInBottom {
      from { opacity: 0; transform: translateX(-50%) translateY(30px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ─── Music Toggle Button ─── */
    .music-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 20;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(167, 139, 250, 0.3);
      background: rgba(13, 10, 26, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.15);
      animation: fadeInBottom 1.5s 2s ease-out forwards;
      opacity: 0;
    }

    .music-btn:hover {
      border-color: rgba(167, 139, 250, 0.6);
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
      transform: scale(1.1);
    }

    .music-btn svg {
      width: 22px;
      height: 22px;
      fill: rgba(255, 255, 255, 0.8);
      transition: fill 0.3s ease;
    }

    .music-btn.playing svg {
      fill: #a78bfa;
    }

    /* Sound wave bars animation */
    .sound-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 18px;
    }

    .sound-bars .bar {
      width: 3px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .music-btn.playing .bar {
      background: #a78bfa;
    }

    .bar:nth-child(1) { animation: soundBar 0.8s 0s ease-in-out infinite; }
    .bar:nth-child(2) { animation: soundBar 0.8s 0.15s ease-in-out infinite; }
    .bar:nth-child(3) { animation: soundBar 0.8s 0.3s ease-in-out infinite; }
    .bar:nth-child(4) { animation: soundBar 0.8s 0.45s ease-in-out infinite; }

    .music-btn:not(.playing) .bar {
      animation: none !important;
      height: 4px !important;
    }

    @keyframes soundBar {
      0%, 100% { height: 4px; }
      50%      { height: 16px; }
    }
  </style>
</head>
<body>

<canvas id="galaxy"></canvas>

<div class="center-text" id="centerText">
  <div class="names-row">
    <span class="name" id="name1">Gabriel</span>
    <span class="heart">&#10084;</span>
    <span class="name" id="name2">Mayra</span>
  </div>
  <div class="subtitle">    . </div>
  <div class="subtitle">   .   </div>
  <div class="subtitle">TE AMO</div>
  <div class="subtitle"><p style="font-size:30px">&#128522;</p></div>
</div>


<!-- Rotating Image -->
<div class="rotating-image-container" id="rotatingImage">
  <div class="rotating-image-wrapper">
    <div class="rotating-image-inner">
      <img src="3.jpg" alt="Galaxy Love">
    </div>
  </div>
</div>

<!-- Background Music (auto-play) -->
<audio id="bgMusic" autoplay loop>
  <source src="1.mp3" type="audio/mp4">
</audio>

<!-- Music Toggle Button -->
<button class="music-btn playing" id="musicBtn" title="Toggle Music">
  <div class="sound-bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</button>

<script>
// ═══════════════════════════════════════════
//  GALAXY STARFIELD — Canvas Engine
// ═══════════════════════════════════════════
(() => {
  const canvas = document.getElementById('galaxy');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Helpers ──
  const rand  = (a, b) => Math.random() * (b - a) + a;
  const TAU   = Math.PI * 2;

  // ── Color palettes ──
  const starColors = [
    'rgba(255,255,255,',
    'rgba(199,210,255,',   // blue-white
    'rgba(255,220,180,',   // warm
    'rgba(167,139,250,',   // purple
    'rgba(96,165,250,',    // blue
    'rgba(255,182,193,',   // pink
    'rgba(255,109,216,',   // magenta
  ];

  // ═══════════════════════════════════════
  //  1. Background Stars (static twinkling)
  // ═══════════════════════════════════════
  const BG_COUNT = 600;
  const bgStars = [];
  for (let i = 0; i < BG_COUNT; i++) {
    bgStars.push({
      x: rand(0, 1),
      y: rand(0, 1),
      r: rand(0.3, 1.6),
      baseAlpha: rand(0.25, 0.9),
      twinkleSpeed: rand(0.5, 3),
      twinkleOffset: rand(0, TAU),
      color: starColors[Math.floor(rand(0, starColors.length))],
    });
  }

  function drawBgStars(t) {
    for (const s of bgStars) {
      const alpha = s.baseAlpha * (0.55 + 0.45 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, TAU);
      ctx.fillStyle = s.color + alpha.toFixed(3) + ')';
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  //  2. Galaxy Spiral Arms
  // ═══════════════════════════════════════
  const ARM_COUNT = 4;
  const PARTICLES_PER_ARM = 220;
  const spiralParticles = [];

  for (let arm = 0; arm < ARM_COUNT; arm++) {
    const armAngle = (TAU / ARM_COUNT) * arm;
    for (let i = 0; i < PARTICLES_PER_ARM; i++) {
      const dist = rand(40, Math.min(W, H) * 0.44);
      const angle = armAngle + (dist / 120) + rand(-0.35, 0.35);
      spiralParticles.push({
        dist,
        angle,
        speed: rand(0.06, 0.18) / (1 + dist * 0.003),
        r: rand(0.4, 1.8),
        alpha: rand(0.15, 0.7) * (1 - dist / (Math.min(W, H) * 0.5)),
        color: starColors[Math.floor(rand(0, starColors.length))],
      });
    }
  }

  function drawSpiral(t) {
    for (const p of spiralParticles) {
      const a = p.angle + t * p.speed;
      const x = cx + Math.cos(a) * p.dist;
      const y = cy + Math.sin(a) * p.dist * 0.55; // elliptical
      const flicker = 0.7 + 0.3 * Math.sin(t * 2 + p.angle * 3);
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, TAU);
      ctx.fillStyle = p.color + (p.alpha * flicker).toFixed(3) + ')';
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  //  3. Core Nebula Glow
  // ═══════════════════════════════════════
  function drawNebula(t) {
    const pulse = 0.9 + 0.1 * Math.sin(t * 0.5);
    const r1 = 90 * pulse;
    const r2 = 200 * pulse;

    const grad = ctx.createRadialGradient(cx, cy, r1, cx, cy, r2);
    grad.addColorStop(0, 'rgba(167,139,250,0.08)');
    grad.addColorStop(0.3, 'rgba(255,77,109,0.04)');
    grad.addColorStop(0.6, 'rgba(96,165,250,0.02)');
    grad.addColorStop(1, 'transparent');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // ═══════════════════════════════════════
  //  4. Shooting Stars
  // ═══════════════════════════════════════
  const shootingStars = [];
  const MAX_SHOOTING = 3;

  function spawnShootingStar() {
    if (shootingStars.length >= MAX_SHOOTING) return;
    if (Math.random() > 0.008) return; // rare

    const angle = rand(0.3, 0.9); // diagonal-ish
    const speed = rand(6, 14);
    const startX = rand(-100, W);
    const startY = rand(-100, H * 0.4);
    shootingStars.push({
      x: startX, y: startY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: rand(0.008, 0.02),
      len: rand(60, 140),
    });
  }

  function drawShootingStars() {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life -= s.decay;
      if (s.life <= 0) { shootingStars.splice(i, 1); continue; }

      const tailX = s.x - s.vx * (s.len / Math.hypot(s.vx, s.vy));
      const tailY = s.y - s.vy * (s.len / Math.hypot(s.vx, s.vy));

      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(1, `rgba(255,255,255,${(s.life * 0.9).toFixed(3)})`);

      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // head glow
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2, 0, TAU);
      ctx.fillStyle = `rgba(255,255,255,${s.life.toFixed(3)})`;
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  //  5. Floating Heart Particles
  // ═══════════════════════════════════════
  const heartParticles = [];
  const HEART_P_COUNT = 35;

  for (let i = 0; i < HEART_P_COUNT; i++) {
    heartParticles.push({
      angle: rand(0, TAU),
      dist: rand(30, 160),
      speed: rand(0.15, 0.4) * (Math.random() < 0.5 ? 1 : -1),
      r: rand(0.8, 2.2),
      alpha: rand(0.2, 0.6),
      drift: rand(-0.3, 0.3),
    });
  }

  function drawHeartParticles(t) {
    for (const p of heartParticles) {
      const a = p.angle + t * p.speed;
      const x = cx + Math.cos(a) * p.dist;
      const y = cy + Math.sin(a) * p.dist * 0.6 + Math.sin(t + p.angle) * 8;
      const alpha = p.alpha * (0.6 + 0.4 * Math.sin(t * 1.5 + p.angle));
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, TAU);
      ctx.fillStyle = `rgba(255,77,109,${alpha.toFixed(3)})`;
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  //  6. Dust Ring
  // ═══════════════════════════════════════
  const DUST_COUNT = 120;
  const dustRing = [];
  for (let i = 0; i < DUST_COUNT; i++) {
    dustRing.push({
      angle: rand(0, TAU),
      dist: rand(150, Math.min(W, H) * 0.38),
      speed: rand(0.02, 0.08),
      r: rand(0.6, 2),
      alpha: rand(0.05, 0.2),
    });
  }

  function drawDustRing(t) {
    for (const d of dustRing) {
      const a = d.angle + t * d.speed;
      const x = cx + Math.cos(a) * d.dist;
      const y = cy + Math.sin(a) * d.dist * 0.5;
      ctx.beginPath();
      ctx.arc(x, y, d.r, 0, TAU);
      ctx.fillStyle = `rgba(167,139,250,${d.alpha.toFixed(3)})`;
      ctx.fill();
    }
  }

  // ═══════════════════════════════════════
  //  RENDER LOOP
  // ═══════════════════════════════════════
  let start = null;
  function frame(ts) {
    if (!start) start = ts;
    const t = (ts - start) / 1000;

    ctx.clearRect(0, 0, W, H);

    // Deep-space gradient
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    bg.addColorStop(0, '#0d0a1a');
    bg.addColorStop(0.5, '#06060f');
    bg.addColorStop(1, '#000005');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    drawBgStars(t);
    drawDustRing(t);
    drawSpiral(t);
    drawNebula(t);
    drawHeartParticles(t);
    spawnShootingStar();
    drawShootingStars();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ═══════════════════════════════════════════
//  MUSIC PLAYER — Auto-play MP4
// ═══════════════════════════════════════════
(() => {
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  let isPlaying = true;

  // Attempt auto-play; if browser blocks it, wait for first click
  audio.play().then(() => {
    isPlaying = true;
    btn.classList.add('playing');
  }).catch(() => {
    // Autoplay was blocked — unmute on first user interaction
    isPlaying = false;
    btn.classList.remove('playing');
    document.addEventListener('click', function autoplayFix() {
      audio.play();
      isPlaying = true;
      btn.classList.add('playing');
      document.removeEventListener('click', autoplayFix);
    }, { once: true });
  });

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      btn.classList.remove('playing');
    } else {
      audio.play();
      isPlaying = true;
      btn.classList.add('playing');
    }
  });
})();
</script>
</body>
</html>
